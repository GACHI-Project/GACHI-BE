name: Deploy to EC2

"on":
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve deploy path
        id: deploy-path
        env:
          EC2_DEPLOY_PATH_SECRET: ${{ secrets.EC2_DEPLOY_PATH }}
        run: |
          RESOLVED_PATH="${EC2_DEPLOY_PATH_SECRET:-}"
          RESOLVED_PATH="${RESOLVED_PATH%$'\r'}"
          RESOLVED_PATH="$(printf '%s' "$RESOLVED_PATH" | sed 's/[[:space:]]*$//')"
          if [ -n "$RESOLVED_PATH" ]; then
            echo "value=$RESOLVED_PATH" >> "$GITHUB_OUTPUT"
          else
            echo "value=/home/ubuntu/GACHI-BE/deploy" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync deploy folder via SCP
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "deploy/docker-compose.yml,deploy/.env.example,deploy/HTTPS-SETUP.md,deploy/nginx,deploy/secrets/spring_mail_password.example.txt"
          target: ${{ steps.deploy-path.outputs.value }}
          strip_components: 1
          overwrite: true

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          EC2_DEPLOY_PATH: ${{ steps.deploy-path.outputs.value }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,EC2_DEPLOY_PATH
          script_stop: true
          script: |
            set -Eeuo pipefail

            DEPLOY_PATH="${EC2_DEPLOY_PATH:-/home/ubuntu/GACHI-BE/deploy}"
            DEPLOY_PATH="$(echo "$DEPLOY_PATH" | xargs)"

            echo "[1/7] Move to deploy path: $DEPLOY_PATH"
            test -d "$DEPLOY_PATH" || { echo "Deploy path not found: $DEPLOY_PATH"; exit 1; }
            cd "$DEPLOY_PATH"
            echo "[debug] host=$(hostname) user=$(whoami) pwd=$(pwd)"
            ls -al

            echo "[2/7] Validate server-side .env preservation"
            test -f .env || { echo ".env not found in $DEPLOY_PATH. Create .env on EC2 before deploy."; exit 1; }

            echo "[3/7] Pin latest backend image tag in .env"
            if grep -q "^BACKEND_IMAGE=" .env; then
              sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${DOCKERHUB_USERNAME}/gachi-be:latest|" .env
            else
              echo "BACKEND_IMAGE=${DOCKERHUB_USERNAME}/gachi-be:latest" >> .env
            fi

            echo "[4/7] Validate SMTP secret file or fallback path"
            SECRET_FILE_REL="$(grep -E "^SPRING_MAIL_PASSWORD_SECRET_FILE=" .env | tail -n1 | cut -d= -f2- || true)"
            SECRET_FILE_REL="${SECRET_FILE_REL:-./secrets/spring_mail_password.example.txt}"
            if [ "${SECRET_FILE_REL#/}" != "$SECRET_FILE_REL" ]; then
              SECRET_FILE_PATH="$SECRET_FILE_REL"
            else
              SECRET_FILE_PATH="$DEPLOY_PATH/${SECRET_FILE_REL#./}"
            fi
            if [ -e "$SECRET_FILE_PATH" ]; then
              test -r "$SECRET_FILE_PATH" || { echo "SMTP secret file exists but is not readable: $SECRET_FILE_PATH"; exit 1; }
              if [ ! -s "$SECRET_FILE_PATH" ]; then
                echo "SMTP secret file is empty: $SECRET_FILE_PATH (fallback env SPRING_MAIL_PASSWORD will be used if set)"
              fi
            else
              echo "SMTP secret file not found: $SECRET_FILE_PATH (fallback env SPRING_MAIL_PASSWORD will be used if set)"
            fi

            echo "[5/7] Pull latest backend image"
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            docker compose --env-file .env pull backend

            echo "[6/7] Recreate services with synced compose/nginx settings"
            docker compose --env-file .env up -d --remove-orphans backend
            docker compose --env-file .env up -d --remove-orphans --force-recreate nginx

            echo "[7/7] Print deploy status"
            docker image prune -f
            docker compose --env-file .env ps
            docker compose --env-file .env logs --tail=80 backend nginx || true
