spring:
  datasource:
    url: jdbc:h2:mem:gachi;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    consent-version: 2026-04-v1
    jwt:
      issuer: gachi-test
      secret: test-secret-key-that-is-longer-than-32-bytes
      access-token-minutes: 15
      refresh-token-days: 7
      refresh-token-remember-days: 30
    email:
      store: memory
      code-ttl-seconds: 300
      resend-cooldown-seconds: 60
      max-attempts: 5
      verified-ttl-seconds: 1800
