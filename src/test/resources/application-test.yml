spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:55432/gachi_test}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:gachi_test}
    password: ${DB_PASSWORD:gachi_test}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  auth:
    consent-version: 2026-04-v1
    jwt:
      issuer: gachi-test
      secret: test-secret-key-that-is-longer-than-32-bytes
      access-token-minutes: 15
      refresh-token-days: 7
      refresh-token-remember-days: 30
    email:
      store: memory
      code-ttl-seconds: 300
      resend-cooldown-seconds: 60
      max-attempts: 5
      verified-ttl-seconds: 1800
      noop-allowed: true
    rate-limit:
      enabled: false
      email-hmac-secret: test-rate-limit-hmac-secret
